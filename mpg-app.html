<!DOCTYPE html>
<head>
    <title>Miles Per Gallon App</title>
    <link rel="stylesheet" href="css/mpg-style.css">
</head>

<body>
    <main>
        <h2>Calculate Miles Per Gallon</h2>
            <div class="form-group">
                <label for="miles">Miles Driven: </label>
                <input type="text" id="miles">
            </div>

            <div class="form-group">
                <label for="gallons">Gallons Used: </label>
                <input type="text" id="gallons">
            </div>

            <div class="form-group">
                <label for="mpg">Miles Per Gallon: </label>
                <input type="text" id="mpg" disabled>
            </div>

        <input type="button" id="calculate" value="Calculate MPG"><br><br>
        <a class="btn" href="index.html">Take Me Home</a>
    </main>
    <script src="scripts/miles-per-gallon-script.js"></script>
</body>
